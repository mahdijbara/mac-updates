name: Update Claude Release

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: macos-latest
    steps:
      - name: Get latest Claude DMG URL and version
        id: anthropic
        run: |
          # Use Homebrew's public cask API — always has the latest version + direct URL
          CASK_JSON=$(curl -sf "https://formulae.brew.sh/api/cask/claude.json")

          if [ -z "$CASK_JSON" ]; then
            echo "ERROR: Could not fetch Homebrew cask info for Claude"
            exit 1
          fi

          VERSION=$(echo "$CASK_JSON" | jq -r '.version')
          RAW_URL=$(echo "$CASK_JSON" | jq -r '.url')
          # Replace #{version} placeholder if present
          DMG_URL="${RAW_URL//'#{version}'/$VERSION}"

          if [ -z "$VERSION" ] || [ -z "$DMG_URL" ]; then
            echo "ERROR: Could not parse version or URL from cask JSON"
            echo "$CASK_JSON"
            exit 1
          fi

          echo "Latest Claude version: $VERSION"
          echo "DMG URL: $DMG_URL"
          echo "dmg_url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

      - name: Get current release version
        id: current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the current release body to read the stored version
          BODY=$(gh release view latest --repo "${{ github.repository }}" --json body -q '.body')
          echo "Current release body: $BODY"

          # Try to parse a version we previously wrote (format: "Version: X.Y.Z")
          CURRENT=$(echo "$BODY" | grep -oE 'Version: [0-9]+\.[0-9]+\.[0-9]+' | head -1 | awk '{print $2}')
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current stored version: $CURRENT"

      - name: Compare versions
        id: compare
        run: |
          NEW="${{ steps.anthropic.outputs.version }}"
          OLD="${{ steps.current.outputs.current_version }}"
          echo "Comparing: old=$OLD  new=$NEW"
          if [ "$NEW" = "$OLD" ]; then
            echo "No update needed."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: $OLD -> $NEW"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download new Claude.dmg
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "Downloading Claude.dmg from ${{ steps.anthropic.outputs.dmg_url }} ..."
          curl -L --progress-bar \
            -o Claude.dmg \
            "${{ steps.anthropic.outputs.dmg_url }}"
          ls -lh Claude.dmg

      - name: Update GitHub release
        if: steps.compare.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.anthropic.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%d")

          # Delete the old Claude.dmg asset (gh release upload with --clobber handles this)
          gh release upload latest Claude.dmg \
            --repo "${{ github.repository }}" \
            --clobber

          # Update release body with new version and date
          NOTES="Version: ${VERSION}\nLast updated: ${DATE}\n\nmacOS universal (Apple Silicon + Intel) build of the Claude desktop app.\n\nDownload link: https://github.com/${{ github.repository }}/releases/download/latest/Claude.dmg"
          printf '%b' "$NOTES" > release_notes.md
          gh release edit latest \
            --repo "${{ github.repository }}" \
            --notes-file release_notes.md

          echo "Release updated to version $VERSION"

      - name: No update needed
        if: steps.compare.outputs.needs_update == 'false'
        run: |
          echo "Claude is already up to date (version ${{ steps.current.outputs.current_version }}). Nothing to do."
